<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Affair Tutor Matching</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#f5f4f1;
  --surface:#ffffff;
  --ink:#1c1c1c;
  --ink2:#6b6b6b;
  --ink3:#aaaaaa;
  --accent:#1c1c1c;
  --blue:#2563eb;
  --blue-light:#eff6ff;
  --border:#e4e2dd;
  --danger:#dc2626;
  --radius:12px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html,body{height:100%;background:var(--bg);}

body{
  font-family:'Malgun Gothic','맑은 고딕','Segoe UI','Segoe UI Emoji','Segoe UI Symbol',-apple-system,BlinkMacSystemFont,'Apple Color Emoji','Noto Color Emoji','Helvetica Neue',sans-serif;
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  max-width:480px;
  margin:0 auto;
}

/* ── PAGES ── */
.page{display:none;min-height:100vh;flex-direction:column;}
.page.active{display:flex;}

/* ── LANG SELECT PAGE ── */
#page-lang{
  justify-content:center;
  align-items:center;
  padding:40px 24px;
  gap:0;
}
.lang-logo{
  font-size:34px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink);
  margin-bottom:20px;
  text-align:center;
  font-weight:900;
}
.lang-title{
  font-size:46px;
  font-weight:900;
  margin-bottom:28px;
  text-align:center;
  letter-spacing:-0.5px;
}
.lang-title .welcome-line{display:block;margin-bottom:18px;font-size:22px;color:#111827;}
.lang-title .brand-line{
  display:block;
  font-size:27px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  margin-bottom:32px;
  color:#111827;
}
.lang-title .lang-logo-img{
  display:block;
  width:120px;
  height:auto;
  margin:6px auto 28px;
}
.lang-title .who-line{
  display:block;
  font-size:44px;
  font-weight:800;
  font-family:'Georgia','Times New Roman',serif;
  letter-spacing:-0.02em;
  color:#111827;
}
.lang-sub{display:none;}
.lang-btns{display:flex;flex-direction:column;gap:12px;width:100%;}
.lang-btn{
  width:100%;
  padding:22px;
  border:2px solid #d1d5db;
  border-radius:18px;
  background:#ffffff;
  font-size:18px;
  font-weight:700;
  color:#111827;
  cursor:pointer;

  box-shadow:
    0 4px 14px rgba(0,0,0,0.06),
    0 1px 2px rgba(0,0,0,0.04);

  transition:all .15s ease;
}
.lang-btn:active{
  transform:scale(0.98);
  background:#f9fafb;
}
.lang-btn .flag{font-size:24px;}

/* ── NAME PAGE ── */
#page-name{padding:0;justify-content:center;}
.name-inner{padding:40px 24px;}
.page-eyebrow{
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--ink3);
  margin-bottom:20px;
}
.page-title{
  font-size:26px;
  font-weight:700;
  line-height:1.3;
  margin-bottom:8px;
  letter-spacing:-0.5px;
}
.page-desc{font-size:14px;color:var(--ink2);margin-bottom:40px;line-height:1.6;}
.underline-input{
  width:100%;
  border:none;
  border-bottom:2px solid var(--ink);
  background:transparent;
  padding:12px 0;
  font-size:20px;
  font-family:inherit;
  color:var(--ink);
  outline:none;
  margin-bottom:32px;
}
.underline-input::placeholder{color:var(--ink3);}

/* ── INTRO PAGE ── */
#page-intro{padding:40px 24px;justify-content:center;}
.intro-badge{
  display:none;
  font-size:11px;
  letter-spacing:0.16em;
  text-transform:uppercase;
  color:var(--ink2);
  border:1px solid var(--border);
  border-radius:100px;
  padding:5px 14px;
  margin-bottom:32px;
}
#page-intro h1{
  font-size:30px;
  font-weight:700;
  line-height:1.25;
  margin-bottom:20px;
  letter-spacing:-0.8px;
}
#page-intro p{font-size:15px;color:var(--ink2);line-height:1.75;margin-bottom:48px;white-space:pre-line;}

/* ── BUTTONS ── */
.btn-primary{
  width:100%;
  padding:17px;
  background:var(--ink);
  color:#fff;
  border:none;
  border-radius:var(--radius);
  font-size:15px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  transition:opacity 0.15s;
  letter-spacing:0.02em;
}
.btn-primary:active{opacity:0.8;}
.btn-primary:disabled{opacity:0.3;cursor:not-allowed;}

.btn-ghost{
  width:100%;
  padding:15px;
  background:transparent;
  color:var(--ink);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  font-size:14px;
  font-weight:500;
  font-family:inherit;
  cursor:pointer;
  transition:border-color 0.15s;
}
.btn-ghost:active{border-color:var(--ink);}

.btn-sm{
  padding:8px 14px;
  font-size:12px;
  width:auto;
  border-radius:8px;
}

/* ── TUTOR LIST PAGE ── */
#page-tutors{padding:0;display:none;flex-direction:column;}
#page-tutors.active{display:flex;}

.topbar{
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:100;
  padding:16px 20px 12px;
  border-bottom:1px solid var(--border);
}
.topbar-row{display:flex;justify-content:space-between;align-items:center;}
.topbar-title{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
.topbar-user{font-size:12px;color:var(--ink2);}
.topbar-actions{display:flex;gap:8px;margin-top:10px;}
.tab-btn{
  flex:1;
  padding:9px;
  border:1.5px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  font-size:12px;
  font-weight:500;
  font-family:inherit;
  color:var(--ink2);
  cursor:pointer;
}
.tab-btn.active-tab{
  background:var(--ink);
  color:#fff;
  border-color:var(--ink);
}

.tutor-list{flex:1;overflow-y:auto;padding:16px 20px 40px;}
.tutor-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:14px;
  overflow:hidden;
}
.tutor-card-header{
  display:flex;
  flex-direction:column;
  align-items:stretch;
  gap:12px;
  padding:24px 16px;
  cursor:pointer;
}
.tutor-header-top{
  display:flex;
  align-items:center;
  gap:10px;
}
.tutor-header-bottom{
  display:flex;
  align-items:center;
  gap:16px;
}
.tutor-header-bottom .tutor-meta{flex:1;min-width:0;}
.tutor-avatar{
  width:114px;
  height:131px;
  border-radius:12px;
  background:var(--border);
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:700;
  color:var(--ink2);
  letter-spacing:-1px;
}
.tutor-avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:inherit;
  display:block;
}
.tutor-meta{flex:1;min-width:0;}
.tutor-name{font-size:16px;font-weight:700;margin-bottom:3px;}
.tutor-name-row{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.tutor-name-text{
  line-height:1.25;
  white-space:nowrap;
  overflow-x:auto;
  overflow-y:hidden;
  -ms-overflow-style:none;      /* IE/Edge legacy */
  scrollbar-width:none;         /* Firefox */
}
.tutor-name-text::-webkit-scrollbar{display:none;} /* Chrome/Safari */
.tutor-status-dot{
  width:10px;height:10px;border-radius:999px;flex:0 0 10px;
  border:1px solid #d1d5db;background:#e5e7eb;
}
.tutor-card.has-input .tutor-status-dot{border-color:#16a34a;background:#22c55e;}
.tutor-card.has-input{border-color:#86efac;box-shadow:0 1px 0 rgba(34,197,94,.18) inset;}
.country-suffix{font-size:0.6em;font-weight:600;color:var(--ink2);}
.tutor-since{font-size:12px;color:var(--ink3);}
.tutor-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.tutor-bio{
  font-size:11px;
  color:var(--ink2);
  line-height:1.65;
  margin:10px 0 4px;
}
.tag{
  font-size:10px;
  padding:3px 8px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:100px;
  color:var(--ink2);
}
.expand-icon{
  font-size:12px;
  font-weight:700;
  color:var(--ink2);
  flex-shrink:0;
}
.tutor-card.open .expand-icon{color:var(--ink);}

.tutor-body{
  display:none;
  padding:0 16px 16px;
  border-top:1px solid var(--border);
}
.tutor-card.open .tutor-body{display:block;}

.section-label{
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink3);
  margin:16px 0 8px;
}
.memo-box{
  width:100%;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--bg);
  padding:11px 12px;
  font-size:14px;
  font-family:inherit;
  color:var(--ink);
  resize:none;
  outline:none;
  line-height:1.7;
  transition:border-color 0.15s;
}
.memo-box:focus{border-color:var(--ink2);}
.memo-box::placeholder{color:var(--ink3);}
.memo-box.time-box{min-height:100px;}
.memo-box.res-box{min-height:72px;}
.memo-box.res-input{min-height:auto;height:44px;}
.memo-box.av-dt{min-height:88px;}
.memo-box.grow{
  height:auto;
  min-height:96px;
  overflow:auto;
  white-space:pre-wrap;
  word-break:break-word;
}
.res-field-label{font-size:12px;color:var(--ink2);margin:10px 0 6px;font-weight:600;}

.seoul-map-wrap{
  position:relative;
  width:100%;
  margin-top:10px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--bg);
  /* Keep layout stable on mobile even before image loads */
  aspect-ratio: 4 / 3;
}
.seoul-map{display:block;width:100%;height:100%;object-fit:contain;}
.area-btn{
  position:absolute;
  border-radius:999px;
  border:1px solid #9ca3af;
  background:rgba(220,220,220,.72);
  color:#555;
  font-size:9px;
  font-weight:700;
  padding:7px 9px;
  line-height:1.15;
  text-align:center;
  cursor:pointer;
}
.area-btn.active{
  background:#38bdf8;
  border-color:#0284c7;
  color:white;
  box-shadow:0 4px 12px rgba(2,132,199,.35);
}
.area-btn:disabled{
  cursor:default;
  opacity:1;
}
.area-btn.mapo{left:10%;top:39%;width:120px;}
.area-btn.gangnam{left:48%;top:65%;width:105px;}
.area-btn.songpa{left:72%;top:53%;width:77px;}
.area-btn.seongdong{left:50%;top:43%;width:115px;}
.area-btn.jongno{left:34%;top:32%;width:91px;}
.area-btn.nowon{left:52%;top:18%;width:120px;}
.area-btn.yeongdeungpo{left:23%;top:60%;width:115px;}
.area-hint{
  margin-top:8px;
  font-size:12px;
  color:var(--ink2);
  line-height:1.5;
}

/* Mobile: reduce overlay button size to prevent collisions */
@media (max-width: 380px){
  .area-btn{font-size:8px;padding:6px 8px;}
  .area-btn.mapo{width:102px;}
  .area-btn.gangnam{width:92px;}
  .area-btn.songpa{width:68px;}
  .area-btn.seongdong{width:98px;}
  .area-btn.jongno{width:82px;}
  .area-btn.nowon{width:105px;}
  .area-btn.yeongdeungpo{width:100px;}
}

.res-count{
  font-size:12px;
  color:var(--ink2);
  margin-bottom:10px;
}
.res-count span{font-weight:600;color:var(--ink);}
.full-tag{
  display:inline-block;
  font-size:11px;
  color:var(--danger);
  border:1px solid var(--danger);
  border-radius:4px;
  padding:2px 8px;
  margin-bottom:10px;
}

.res-item{
  background:var(--bg);
  border-radius:8px;
  padding:10px 12px;
  margin-bottom:8px;
  font-size:13px;
  line-height:1.6;
}
.res-item-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.res-name{font-weight:600;font-size:14px;}
.res-del{
  background:none;
  border:none;
  color:var(--ink3);
  font-size:18px;
  cursor:pointer;
  padding:0 2px;
  line-height:1;
}
.res-memo{color:var(--ink2);}
.res-date{font-size:11px;color:var(--ink3);margin-top:3px;}
.empty-msg{font-size:13px;color:var(--ink3);padding:8px 0;}

/* ── SUMMARY (IN TUTORS PAGE) ── */
#summaryWrap{display:none;flex-direction:column;}
.summary-search-wrap{padding:10px 20px 8px;}
.summary-search{
  width:100%;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--surface);
  padding:12px 12px;
  font-size:14px;
  font-family:inherit;
  outline:none;
}
.summary-search::placeholder{color:var(--ink3);}
.summary-list{overflow-y:auto;padding:8px 20px 40px;}
.summary-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:12px;
  overflow:hidden;
}
.summary-card-header{
  padding:14px 16px;
  font-weight:700;
  font-size:15px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.summary-badge{
  font-size:11px;
  font-weight:500;
  background:var(--blue-light);
  color:var(--blue);
  border-radius:100px;
  padding:3px 10px;
}
.summary-body{padding:12px 16px;}
.match-item{
  font-size:13px;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  line-height:1.6;
  color:var(--ink2);
}
.match-item:last-child{border-bottom:none;}
.match-item strong{color:var(--ink);}
</style>
</head>
<body>

<!-- PAGE 0: 언어선택 -->
<section id="page-lang" class="page active">
  <div class="lang-title">
    <span class="welcome-line">Welcome to</span>
    <span class="brand-line">SPOON AFFAIR</span>
    <img src="logo.png" class="lang-logo-img" alt="Spoon Affair logo"/>
    <span class="who-line">Who are you?</span>
  </div>
  <div class="lang-btns">
    <button class="lang-btn" onclick="chooseRole('member','ko')">
      <span>I'm a member</span>
    </button>
    <button class="lang-btn" onclick="chooseRole('tutor','en')">
      <span>I'm a tutor</span>
    </button>
  </div>
</section>

<!-- PAGE 1: 이름입력 -->
<section id="page-name" class="page">
  <div class="name-inner">
    <div class="page-eyebrow">Affair Tutor Matching</div>
    <div class="page-title" id="name-title">이름을 입력하세요</div>
    <div class="page-desc" id="name-desc">한글 이름을 입력한 뒤 다음으로 이동합니다.</div>
    <input class="underline-input" id="memberNameKo" type="text" placeholder="예: 김유나" autocomplete="off"/>
    <input class="underline-input" id="memberNameEn" type="text" placeholder="e.g. Jamie" autocomplete="off" style="margin-top:8px;"/>
    <button class="btn-primary" id="name-btn" onclick="goToIntro()">다음 →</button>
  </div>
</section>

<!-- PAGE 2: 인트로 -->
<section id="page-intro" class="page">
  <div class="intro-badge" id="intro-badge">안내</div>
  <h1 id="intro-title">어페어를<br>할 준비가<br>되셨습니까?</h1>
  <p id="intro-desc">간단한 설명이 들어갈 예정입니다.<br>내용을 채워주세요.</p>
  <button class="btn-primary" id="intro-btn" onclick="goToTutors()">이해했습니다 →</button>
</section>

<!-- PAGE 3: 튜터 목록 -->
<section id="page-tutors" class="page">
  <div class="topbar">
    <div class="topbar-row">
      <div class="topbar-title">Affair</div>
      <div class="topbar-user" id="topbar-user"></div>
    </div>
    <div class="topbar-actions">
      <button class="tab-btn active-tab" id="tab-tutors" onclick="showTab('tutors')">튜터 선택</button>
      <button class="tab-btn" id="tab-summary" onclick="showTab('summary')">매칭 정리</button>
    </div>
  </div>
  <div class="tutor-list" id="tutorList"></div>

  <!-- 매칭 정리 (탭) -->
  <div id="summaryWrap" style="display:none;">
    <div class="summary-search-wrap">
      <input id="summarySearch" class="summary-search" type="text" placeholder="회원/튜터 이름 검색 (예: 김유나 또는 Jenna)"/>
    </div>
    <div class="summary-list" id="summaryList"></div>
  </div>
</section>

const shared = {
  bound: false,
  availByTutor: {},   // { [tutorId]: { online, datetime, areaText } }
  areasByTutor: {},   // { [tutorId]: string[] }
  resByTutor: {},     // { [tutorId]: Array<{ key, name, memo, createdAt }> }
};

function pathAvail(id){ return `tutors/${id}/availability`; }
function pathAreas(id){ return `tutors/${id}/areas`; }
function pathRes(id){ return `tutors/${id}/reservations`; }

function ensureSharedListeners(){
  if(shared.bound) return;
  shared.bound = true;

  const isFocusWithinTutorCard = (tutorId) => {
    const el = document.activeElement;
    if(!el || typeof el.closest !== 'function') return false;
    return !!el.closest(`#card_${tutorId}`);
  };

  for(const tu of tutors){
    const id = tu.id;

    db.ref(pathAvail(id)).on('value', (snap)=>{
      const v = snap.val() || {};
      shared.availByTutor[id] = {
        online: typeof v.online === 'string' ? v.online : '',
        datetime: typeof v.datetime === 'string' ? v.datetime : '',
        areaText: typeof v.areaText === 'string' ? v.areaText : '',
        updatedAt: Number(v.updatedAt || 0),
      };
      // Avoid re-render while user is typing in this card (mobile keyboard drops on DOM replace)
      if(!isFocusWithinTutorCard(id)){
        rebuildTutorOrder();
        renderTutorsPreserveUI();
      }
      if(currentTab === 'summary') renderSummary();
    });

    db.ref(pathAreas(id)).on('value', (snap)=>{
      const v = snap.val();
      shared.areasByTutor[id] = Array.isArray(v) ? v : [];
      if(!isFocusWithinTutorCard(id)){
        rebuildTutorOrder();
        renderTutorsPreserveUI();
      }
    });

    db.ref(pathRes(id)).on('value', (snap)=>{
      const v = snap.val() || {};
      const list = Object.entries(v).map(([key, row])=>{
        const r = row || {};
        return {
          key,
          name: String(r.name || ''),
          memo: String(r.memo || ''),
          createdAt: Number(r.createdAt || 0),
        };
      }).sort((a,b)=>a.createdAt - b.createdAt);
      shared.resByTutor[id] = list;
      if(!isFocusWithinTutorCard(id)) rerenderCard(id);
      if(currentTab === 'summary') renderSummary();
    });
  }
}

function getAreas(id){
  return shared.areasByTutor[id] || [];
}
function toggleArea(id, area){
  if(role !== 'tutor') return;
  const set = new Set(getAreas(id));
  if(set.has(area)) set.delete(area);
  else set.add(area);
  db.ref(pathAreas(id)).set([...set]);
}

let lang = localStorage.getItem('af_lang') || '';
let role = localStorage.getItem('af_role') || '';
let memberNameKo = localStorage.getItem('af_member_ko') || '';
let memberNameEn = localStorage.getItem('af_member_en') || '';
let currentTab = 'tutors';
let tutorOrderIds = [];

function normName(s){
  return String(s || '').trim().toLowerCase();
}
function tutorHasInput(id){
  const av = shared.availByTutor[id] || {};
  const hasAvail = !!(String(av.online||'').trim() || String(av.datetime||'').trim() || String(av.areaText||'').trim());
  const hasAreas = (getAreas(id) || []).length > 0;
  return hasAvail || hasAreas;
}
function tutorUpdatedAt(id){
  const av = shared.availByTutor[id] || {};
  return Number(av.updatedAt || 0);
}
function rebuildTutorOrder(){
  const base = tutors
    .map(t => t.id)
    .filter(id => id !== 'napkins')
    .sort((a,b)=>{
      const aHas = tutorHasInput(a);
      const bHas = tutorHasInput(b);
      if(aHas !== bHas) return aHas ? -1 : 1;
      if(aHas && bHas){
        const ta = tutorUpdatedAt(a);
        const tb = tutorUpdatedAt(b);
        if(ta !== tb) return tb - ta; // most recently updated first
      }
      const aName = normName((tutors.find(t=>t.id===a)||{}).name);
      const bName = normName((tutors.find(t=>t.id===b)||{}).name);
      return aName.localeCompare(bName, 'en', {sensitivity:'base'});
    });

  tutorOrderIds = (role === 'tutor') ? ['napkins', ...base] : base;
}

function t(){ return T[lang] || T['ko']; }
function memberLabel(){
  if(role === 'tutor') return (lang === 'en') ? 'Tutor' : '튜터';
  if(memberNameKo && memberNameEn) return `${memberNameKo} (${memberNameEn})`;
  return memberNameKo || memberNameEn || '';
}

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el = document.getElementById(id);
  if(el){ el.classList.add('active'); }
}

function setLang(l){
  lang = l;
  localStorage.setItem('af_lang', l);
  applyLang();
  showPage('page-name');
  if(memberNameKo) document.getElementById('memberNameKo').value = memberNameKo;
  if(memberNameEn) document.getElementById('memberNameEn').value = memberNameEn;
}

function chooseRole(nextRole, nextLang){
  role = nextRole;
  localStorage.setItem('af_role', role);
  lang = nextLang;
  localStorage.setItem('af_lang', lang);
  applyLang();

  if(role === 'tutor'){
    // skip name input for tutor role
    memberNameKo = '';
    memberNameEn = '';
    localStorage.removeItem('af_member_ko');
    localStorage.removeItem('af_member_en');
    goToTutors();
    return;
  }

  showPage('page-name');
  if(memberNameKo) document.getElementById('memberNameKo').value = memberNameKo;
  if(memberNameEn) document.getElementById('memberNameEn').value = memberNameEn;
}

function applyLang(){
  const tx = t();
  document.getElementById('name-title').textContent = tx.nameTitle;
  document.getElementById('name-desc').textContent = tx.nameDesc;
  document.getElementById('memberNameKo').placeholder = tx.namePlaceholderKo;
  document.getElementById('memberNameEn').placeholder = tx.namePlaceholderEn;
  document.getElementById('name-btn').textContent = tx.nameBtn;
  document.getElementById('intro-badge').textContent = tx.introBadge;
  document.getElementById('intro-title').innerHTML = tx.introTitle.replace(/\n/g,'<br>');

  document.getElementById('intro-btn').textContent = tx.introBtn;

  ensureSharedListeners();

  renderTutors();
  showPage('page-tutors');
  // members should not see summary tab
  const summaryTab = document.getElementById('tab-summary');
  if(summaryTab) summaryTab.style.display = (role === 'tutor') ? '' : 'none';
  showTab('tutors');
}

function showTab(tab){
  if(tab === 'summary' && role !== 'tutor') return;
  currentTab = tab;
  document.getElementById('tab-tutors').classList.toggle('active-tab', tab==='tutors');
  document.getElementById('tab-summary').classList.toggle('active-tab', tab==='summary');
  document.getElementById('tutorList').style.display = tab==='tutors' ? 'block' : 'none';
  if(tab==='summary'){
    const s = document.getElementById('summarySearch');
    if(s && !s.dataset.bound){
      s.addEventListener('input', ()=>renderSummary());
      s.dataset.bound = '1';
    }
    renderSummary();
  }
  const wrap = document.getElementById('summaryWrap');
  if(wrap) wrap.style.display = tab==='summary' ? 'block' : 'none';
}

function getRes(id){ return shared.resByTutor[id] || []; }
function getTime(id){ return localStorage.getItem('af_time_'+id)||''; }

function getTutorAvailOnline(id){ return shared.availByTutor[id]?.online || ''; }
function getTutorAvailDateTime(id){ return shared.availByTutor[id]?.datetime || ''; }
function getTutorAvailArea(id){ return shared.availByTutor[id]?.areaText || ''; }

function saveTutorAvail(id){
  if(role !== 'tutor') return;
  const online = document.getElementById('av_online_'+id)?.value ?? '';
  const dt = document.getElementById('av_dt_'+id)?.value ?? '';
  const area = document.getElementById('av_area_'+id)?.value ?? '';
  db.ref(pathAvail(id)).update({
    online,
    datetime: dt,
    areaText: area,
    updatedAt: firebase.database.ServerValue.TIMESTAMP,
  });
}

function saveRes(id){
  const areaEl = document.getElementById('r_area_'+id);
  const dateEl = document.getElementById('r_date_'+id);
  const timeEl = document.getElementById('r_time_'+id);
  const area = (areaEl?.value || '').trim();
  const date = (dateEl?.value || '').trim();
  const time = (timeEl?.value || '').trim();
  const tx = t();
  if(!area || !date || !time){
    alert(lang==='en' ? 'Please fill in area, date, and time.' : '희망장소/희망날짜/희망시간을 모두 입력해주세요.');
    return;
  }
  const list = getRes(id);
  if(list.length>=MAX_RESERVATIONS_PER_TUTOR){
    alert(lang==='en'?'This tutor is fully booked.':'예약 가능 인원이 마감됐습니다.');
    return;
  }
  const memo = `희망장소(온라인): ${area}\n희망날짜: ${date}\n희망시간: ${time}`;
  db.ref(pathRes(id)).push({
    name: memberLabel(),
    memo,
    createdAt: firebase.database.ServerValue.TIMESTAMP,
  });
  if(areaEl) areaEl.value='';
  if(dateEl) dateEl.value='';
  if(timeEl) timeEl.value='';
}

function delRes(id, key){
  if(!key) return;
  db.ref(`${pathRes(id)}/${key}`).remove();
}

function countrySuffix(country){
  const c = String(country || '').trim();
  return c ? ` <span class="country-suffix">(${c})</span>` : '';
}

function tutorPhotoSrc(tutor){
  const file = tutorPhotoFileById[tutor.id];
  if(!file) return '';
  // allow absolute/relative custom paths (e.g. './nap.jpg' next to seoul.png)
  if(file.startsWith('./') || file.startsWith('../') || file.startsWith('/') || file.includes('://')){
    return encodeURI(file);
  }
  // photos are stored at repo root (no folder)
  return encodeURI(file);
}

function visibleTutors(){
  if(!tutorOrderIds.length) rebuildTutorOrder();
  const byId = Object.fromEntries(tutors.map(t => [t.id, t]));
  return tutorOrderIds.map(id => byId[id]).filter(Boolean);
}

function toggleCard(id){
  const card = document.getElementById('card_'+id);
  const isOpen = card.classList.toggle('open');
  const label = isOpen ? (lang==='en' ? 'Close' : '닫기') : (lang==='en' ? 'Open' : '열기');
  const el = card.querySelector('.expand-icon');
  if(el) el.textContent = label;
}

function rerenderCard(id){
  const tutor = visibleTutors().find(t=>t.id===id);
  if(!tutor) return;
  const card = document.getElementById('card_'+id);
  const wasOpen = card.classList.contains('open');
  card.outerHTML = buildCard(tutor, wasOpen);
  bindCard(id);
}

function bindCard(id){
  const online = document.getElementById('av_online_'+id);
  const dt = document.getElementById('av_dt_'+id);
  const area = document.getElementById('av_area_'+id);
  const autoGrow = (el)=>{
    if(!el) return;
    // Make it reliably grow on mobile as content changes.
    el.style.height = '0px';
    el.style.height = `${el.scrollHeight}px`;
  };

  // keep long text readable for both tutor + member views
  if(area && area.tagName === 'TEXTAREA' && area.classList.contains('grow')){
    const grow = ()=>autoGrow(area);
    // Run twice (now + next frame) to handle font/layout timing
    grow();
    requestAnimationFrame(grow);
    area.addEventListener('input', grow);
    area.addEventListener('change', grow);
    area.addEventListener('focus', ()=>requestAnimationFrame(grow));
  }

  if(role === 'tutor'){
    if(online) online.addEventListener('input', ()=>saveTutorAvail(id));
    if(dt) dt.addEventListener('input', ()=>saveTutorAvail(id));
    if(area) area.addEventListener('input', ()=>saveTutorAvail(id));
  }
}

function buildCard(tutor, open=false){
  const tx = t();
  const res = getRes(tutor.id);
  const isFull = res.length >= MAX_RESERVATIONS_PER_TUTOR;
  const initials = tutor.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const nameLabel = `${tutor.name}${countrySuffix(tutor.country)}`;
  const photoSrc = tutorPhotoSrc(tutor);
  const avatarHtml = photoSrc ? `<img src="${photoSrc}" alt="${tutor.name}"/>` : initials;
  const areas = getAreas(tutor.id);
  const expandLabel = open ? (lang==='en' ? 'Close' : '닫기') : (lang==='en' ? 'Open' : '열기');
  const hasInput = tutorHasInput(tutor.id);

  const bioText = String(tutor.bio||'').trim();
  const bioHtml = bioText ? `<div class="tutor-bio">${bioText}</div>` : '';

  const resItems = res.map((r)=>`
    <div class="res-item">
      <div class="res-item-top">
        <span class="res-name">${r.name}</span>
        <button class="res-del" onclick="delRes('${tutor.id}','${String(r.key||'')}')">×</button>
      </div>
      <div class="res-memo">${String(r.memo||'').replace(/\n/g,'<br>')}</div>
      <div class="res-date">${r.createdAt ? new Date(r.createdAt).toLocaleDateString(lang==='ko'?'ko-KR':'en-US') : ''}</div>
    </div>
  `).join('');

  return `
  <div class="tutor-card${open?' open':''}${hasInput?' has-input':''}" id="card_${tutor.id}">
    <div class="tutor-card-header" onclick="toggleCard('${tutor.id}')">
      <div class="tutor-header-top">
        <div class="tutor-name tutor-name-row">
          <span class="tutor-status-dot" aria-hidden="true"></span>
          <span class="tutor-name-text">${nameLabel}</span>
        </div>
        <div class="expand-icon">${expandLabel}</div>
      </div>
      <div class="tutor-header-bottom">
        <div class="tutor-avatar">${avatarHtml}</div>
        <div class="tutor-meta">
          <div class="tutor-tags">${tutor.tags.map(tg=>`<span class="tag">${tg}</span>`).join('')}</div>
          ${bioHtml}
        </div>
      </div>
    </div>
    <div class="tutor-body">
      <div class="section-label">Available Area</div>
      <div class="seoul-map-wrap">
        <img src="./Seoul.png" class="seoul-map" alt="Seoul map"/>
        <button class="area-btn mapo ${areas.includes('mapo')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','mapo')">Mapo<br>Seodaemun<br>Eunpyeong</button>
        <button class="area-btn jongno ${areas.includes('jongno')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','jongno')">Jongno<br>Jung<br>Yongsan</button>
        <button class="area-btn seongdong ${areas.includes('seongdong')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','seongdong')">Seongdong<br>Gwangjin<br>Dongdaemun</button>
        <button class="area-btn gangnam ${areas.includes('gangnam')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','gangnam')">Gangnam<br>Seocho</button>
        <button class="area-btn songpa ${areas.includes('songpa')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','songpa')">Songpa<br>Gangdong</button>
        <button class="area-btn yeongdeungpo ${areas.includes('yeongdeungpo')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','yeongdeungpo')">Yeongdeungpo<br>Guro<br>Yangcheon</button>
        <button class="area-btn nowon ${areas.includes('nowon')?'active':''}" ${role==='tutor'?'':'disabled'} onclick="toggleArea('${tutor.id}','nowon')">Nowon<br>Dobong<br>Gangbuk</button>
      </div>
      <div class="area-hint">${areas.length ? `Selected: ${areas.join(', ')}` : 'Select area(s) on the map.'}</div>

      <div class="section-label">${tx.sectionTime}</div>
      <div class="res-field-label">*Online Available (O/X)</div>
      <input class="memo-box res-input" id="av_online_${tutor.id}" type="text" placeholder="O or X" value="${getTutorAvailOnline(tutor.id)}" ${role==='tutor'?'':'readonly'}/>
      <div class="res-field-label">*Available Date & Time</div>
      <textarea class="memo-box time-box av-dt" id="av_dt_${tutor.id}" placeholder="Enter available date & time" ${role==='tutor'?'':'readonly'}>${getTutorAvailDateTime(tutor.id)}</textarea>
      <div class="res-field-label">*Available Area (based on subway access)</div>
      <textarea class="memo-box time-box av-dt" id="av_area_${tutor.id}" placeholder="e.g. Itaewon, HBC, Gangnam, Hongdae" ${role==='tutor'?'':'readonly'}>${getTutorAvailArea(tutor.id)}</textarea>

      <div class="section-label">${tx.sectionRes}</div>
      <div class="res-count">${lang==='ko'?`예약 <span>${res.length}</span>/${MAX_RESERVATIONS_PER_TUTOR}`:`<span>${res.length}</span>/${MAX_RESERVATIONS_PER_TUTOR} reserved`}</div>
      ${isFull ? `<div class="full-tag">${tx.full}</div>` : ''}
      ${role==='tutor' ? '' : (isFull ? '' : `
        <div class="res-field-label">희망장소(온라인) :</div>
        <input class="memo-box res-input" id="r_area_${tutor.id}" type="text" placeholder="예: 홍대입구 (역기준) or 온라인"/>
        <div class="res-field-label">희망날짜 :</div>
        <input class="memo-box res-input" id="r_date_${tutor.id}" type="text" placeholder="예: 5/10(토)"/>
        <div class="res-field-label">희망시간 :</div>
        <input class="memo-box res-input" id="r_time_${tutor.id}" type="text" placeholder="예: 오후 2~4시"/>
        <button class="btn-primary btn-sm" onclick="saveRes('${tutor.id}')" style="margin-top:10px;margin-bottom:16px;">${tx.resBtn}</button>
      `)}
      <div id="reslist_${tutor.id}">
        ${res.length ? resItems : `<div class="empty-msg">${tx.emptyRes}</div>`}
      </div>
    </div>
  </div>`;
}

function renderTutors(){
  const grid = document.getElementById('tutorList');
  const list = visibleTutors();
  grid.innerHTML = list.map(tu=>buildCard(tu)).join('');
  list.forEach(tu=>bindCard(tu.id));
}

function renderTutorsPreserveUI(){
  const grid = document.getElementById('tutorList');
  if(!grid) return;
  const scrollTop = grid.scrollTop;
  const openIds = new Set(Array.from(grid.querySelectorAll('.tutor-card.open')).map(el => (el.id||'').replace(/^card_/,'')));
  const list = visibleTutors();
  grid.innerHTML = list.map(tu=>buildCard(tu, openIds.has(tu.id))).join('');
  list.forEach(tu=>bindCard(tu.id));
  grid.scrollTop = scrollTop;
}

function renderSummary(){
  const tx = t();
  const sl = document.getElementById('summaryList');
  const q = (document.getElementById('summarySearch')?.value || '').trim().toLowerCase();

  const cards = visibleTutors().map(tutor=>{
    const resAll = getRes(tutor.id);
    const tutorName = String(tutor.name || '').toLowerCase();
    const matchTutor = q ? tutorName.includes(q) : true;
    const resByMember = q ? resAll.filter(r => String(r.name||'').toLowerCase().includes(q)) : resAll;
    const res = matchTutor ? resAll : resByMember;
    const nameLabel = `${tutor.name}${countrySuffix(tutor.country)}`;
    const items = res.length
      ? res.map(r=>`<div class="match-item"><strong>${nameLabel}</strong> ↔ <strong>${r.name}</strong><br>${String(r.memo||'').replace(/\n/g,'<br>')}</div>`).join('')
      : `<div class="match-item" style="color:var(--ink3);">${q ? '검색 결과 없음' : tx.emptyMatch}</div>`;

    // show this tutor card if:
    // - query matches tutor name, OR
    // - query matches at least one member reservation name
    if(q && !matchTutor && resByMember.length === 0) return '';

    return `
    <div class="summary-card">
      <div class="summary-card-header">
        ${nameLabel}
        <span class="summary-badge">${tx.matchBadge(res.length)}</span>
      </div>
      <div class="summary-body">${items}</div>
    </div>`;
  }).filter(Boolean);

  sl.innerHTML = cards.length ? cards.join('') : `<div class="match-item" style="color:var(--ink3);padding:12px 0;">검색 결과 없음</div>`;
}

if(lang){ applyLang(); showPage('page-lang'); }
